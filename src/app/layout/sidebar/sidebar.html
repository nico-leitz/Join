<aside class="sidebar">
  <img
    class="sidebar__logo"
    src="assets/sidebar/icons/join-logo.svg"
    alt="Join Logo"
  />

  <nav
    class="sidebar__nav"
    aria-label="Main navigation"
  >
    <a
      class="sidebar__link"
      routerLink="/summary"
      routerLinkActive="sidebar__link--active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <img
        src="assets/sidebar/icons/nav-summary-icon.svg"
        alt=""
        aria-hidden="true"
      />
      <span>Summary</span>
    </a>

    <a
      class="sidebar__link"
      routerLink="/add-task"
      routerLinkActive="sidebar__link--active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <img
        src="assets/sidebar/icons/nav-addTask-icon.svg"
        alt=""
        aria-hidden="true"
      />
      <span>Add Task</span>
    </a>

    <a
      class="sidebar__link"
      routerLink="/board"
      routerLinkActive="sidebar__link--active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <img
        src="assets/sidebar/icons/nav-board-icon.svg"
        alt=""
        aria-hidden="true"
      />
      <span>Board</span>
    </a>

    <a
      class="sidebar__link"
      routerLink="/contacts"
      routerLinkActive="sidebar__link--active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <img
        src="assets/sidebar/icons/nav-contacts-icon.svg"
        alt=""
        aria-hidden="true"
      />
      <span>Contacts</span>
    </a>
  </nav>

  <nav
    class="sidebar__legal"
    aria-label="Legal navigation"
  >
    <a
      class="sidebar__legal-link"
      routerLink="/privacy-policy"
      routerLinkActive="sidebar__legal-link--active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Privacy Policy
    </a>

    <a
      class="sidebar__legal-link"
      routerLink="/legal-notice"
      routerLinkActive="sidebar__legal-link--active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Legal Notice
    </a>
  </nav>
</aside>

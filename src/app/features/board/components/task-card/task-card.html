<article
  class="task_card"
  role="button"
  tabindex="0"
  (click)="openCard()"
  (keydown.enter)="openCard()"
  (keydown.space)="
    $event.preventDefault();
    openCard()
  "
>
  <div
    class="task_card__type"
    [class.task_card__type--technical]="
      task().category === 'technical_task'
    "
    [class.task_card__type--user-story]="
      task().category === 'user_story'
    "
  >
    {{ categoryLabel() }}
  </div>

  <h2 class="task_card__title">
    {{ task().title }}
  </h2>

  <p class="task_card__desc">
    {{ task().description }}
  </p>

  @if (progress().total > 0) {
    <div class="task_card__subtasks_wrapper">
      <div
        class="task_card__progress"
        aria-hidden="true"
      >
        <div
          class="task_card__progress_fill"
          [style.width.%]="
            progress().percentage
          "
        ></div>
      </div>

      <span class="task_card__subtasks_text">
        {{ progress().completed }}/{{
          progress().total
        }}
        Subtasks
      </span>
    </div>
  }

  <div class="task_card__footer">
    <div
      class="task_card__badges"
      aria-label="Assigned contacts"
    >
      @for (
        contact of assignedContacts();
        track contact.id
      ) {
        <div
          class="task_card__badge"
          [style.background-color]="
            contact.badgeColor
          "
          [attr.title]="
            contact.firstName +
            ' ' +
            contact.lastName
          "
        >
          {{ getInitials(contact) }}
        </div>
      }
    </div>

    <div class="task_card__priority">
      <img
        [src]="
          'assets/board/board-card/' +
          task().priority +
          '.svg'
        "
        [alt]="
          task().priority + ' priority'
        "
      />
    </div>
  </div>
</article>

<div
  class="contact-dialog-backdrop"
  [class.contact-dialog-backdrop--closing]="isClosing()"
  (click)="cancel()"
>
  <section
    class="contact-dialog contact-dialog--edit"
    [class.contact-dialog--closing]="isClosing()"
    aria-label="Edit contact dialog"
    (click)="$event.stopPropagation()"
  >
    <div class="contact-dialog__side">
      <img
        class="contact-dialog__logo"
        src="assets/contact-details/join-logo.svg"
        alt="Join Logo"
      />

      <div class="contact-dialog__heading">
        <h2>Edit contact</h2>
        <span class="contact-dialog__accent" aria-hidden="true"></span>
      </div>
    </div>

    <form
      class="contact-dialog__form"
      [formGroup]="contactForm"
      (ngSubmit)="submitForm()"
      novalidate
    >
      <button
        class="contact-dialog__close"
        type="button"
        (click)="cancel()"
        aria-label="Close dialog"
      >
        ×
      </button>

      <div
        class="contact-dialog__avatar"
        [style.background-color]="contact().badgeColor"
      >
        {{ getInitials() }}
      </div>

      <label class="contact-dialog__field form-field">
        <span class="sr-only">Name</span>
        <input
          class="contact-dialog__input form-input"
          type="text"
          formControlName="fullName"
          placeholder="Name"
          aria-describedby="edit-name-error"
          [class.form-input--invalid]="hasNameError()"
        />
        <img
          class="contact-dialog__field-icon"
          src="assets/contact-details/person.svg"
          alt=""
          aria-hidden="true"
        />
        <span class="contact-dialog__error form-error" id="edit-name-error">
          {{ getNameErrorMessage() }}
        </span>
      </label>

      <label class="contact-dialog__field form-field">
        <span class="sr-only">Email</span>
        <input
          class="contact-dialog__input form-input"
          type="email"
          formControlName="email"
          placeholder="Email"
          aria-describedby="edit-email-error"
          [class.form-input--invalid]="hasEmailError()"
        />
        <img
          class="contact-dialog__field-icon"
          src="assets/contact-details/mail.svg"
          alt=""
          aria-hidden="true"
        />
        <span class="contact-dialog__error form-error" id="edit-email-error">
          {{ getEmailErrorMessage() }}
        </span>
      </label>

      <label class="contact-dialog__field form-field">
        <span class="sr-only">Phone</span>
        <input
          class="contact-dialog__input form-input"
          type="tel"
          inputmode="tel"
          formControlName="phone"
          placeholder="Phone"
          aria-describedby="edit-phone-error"
          [class.form-input--invalid]="hasPhoneError()"
          (input)="sanitizePhoneInput()"
        />
        <img
          class="contact-dialog__field-icon"
          src="assets/contact-details/call.svg"
          alt=""
          aria-hidden="true"
        />
        <span class="contact-dialog__error form-error" id="edit-phone-error">
          {{ getPhoneErrorMessage() }}
        </span>
      </label>

      <div class="contact-dialog__actions">
        <button
          class="button button-clean"
          type="button"
          (click)="deleteContact()"
        >
          Delete
        </button>

        <button class="button button-primary" type="submit">
          <span>Save</span>
          <span aria-hidden="true">✓</span>
        </button>
      </div>
    </form>
  </section>
</div>

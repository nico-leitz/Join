<button class="button button-primary contact__button" type="button" (click)="openCreateDialog()">
  Add new contact <img class="contact__btn_icon" src="assets/contact-details/person_add.svg" alt="add button">
</button>

<button class="contact__fab" type="button" (click)="openCreateDialog()" aria-label="Add new contact">
  <img
    class="contact__fab-icon"
    src="assets/contact-details/addcontactmobile.svg"
    alt=""
    aria-hidden="true"
  />
</button>

<div class="contact__wrapper" [class.contact__wrapper--hidden-mobile]="contact()">
  @if (isLoading()) {
    <p class="contact__status">Kontakte werden geladen...</p>
  } @else if (errorMessage()) {
    <p class="contact__status contact__status--error">{{ errorMessage() }}</p>
  } @else {
    <div class="contact__scroll-container">
      @for (contact of contacts(); track contact.id; let index = $index) {
        @if (shouldShowLetterHeader(index)) {
          <div class="contact__letter-header">
            {{ contact.firstName.charAt(0).toUpperCase() }}
          </div>
        }

        <button class="contact__item" type="button" (click)="getContact(contact)">
          <span class="contact__badge" [style.background-color]="contact.badgeColor">
            {{ getInitials(contact.firstName, contact.lastName) }}
          </span>

          <span class="contact__info">
            <span class="contact__name"> {{ contact.firstName }} {{ contact.lastName }} </span>
            <span class="contact__email">{{ contact.email }}</span>
          </span>
        </button>
      }
    </div>
  }
</div>

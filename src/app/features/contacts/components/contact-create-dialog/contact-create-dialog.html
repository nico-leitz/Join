<div class="contact-dialog-backdrop" [class.contact-dialog-backdrop--closing]="isClosing()" (click)="cancel()">
  <section class="contact-dialog" [class.contact-dialog--closing]="isClosing()" aria-label="Add contact dialog" (click)="$event.stopPropagation()">
    <div class="contact-dialog__side">
      <div class="contact-dialog__logo">J</div>
      <h2>Add contact</h2>
      <p>Tasks are better with a team!</p>
    </div>

    <form
      class="contact-dialog__form"
      [formGroup]="contactForm"
      (ngSubmit)="submitForm()"
    >
      <button
        class="contact-dialog__close"
        type="button"
        (click)="cancel()"
        aria-label="Close dialog"
      >
        ×
      </button>

      <div class="contact-dialog__avatar">?</div>

      <label>
        <span class="sr-only">Name</span>
        <input type="text" formControlName="fullName" placeholder="Name" />
      </label>

      <label>
        <span class="sr-only">Email</span>
        <input type="email" formControlName="email" placeholder="Email" />
      </label>

      <label>
        <span class="sr-only">Phone</span>
        <input type="tel" formControlName="phone" placeholder="Phone" />
      </label>

      <div class="contact-dialog__actions">
        <button class="button button-clean" type="button" (click)="cancel()">
          Cancel
        </button>
        <button class="button button-primary" type="submit">
          Create contact ✓
        </button>
      </div>
    </form>
  </section>
</div>
